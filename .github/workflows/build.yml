name: Generate Android Live Audio APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # FIX #3: Quotes required around version string
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.1.1'

      - name: Auto-Generate Android Project Structure
        run: |
          mkdir -p app/src/main/java/com/example/wifiaudio
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          # FIX #1 & #2: Create wrapper infrastructure (no system Gradle needed)
          mkdir -p gradle/wrapper
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.1.1/gradle/wrapper/gradle-wrapper.jar" \
               -o gradle/wrapper/gradle-wrapper.jar

          cat << 'EOF' > gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.1.1-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.1.1/gradlew" \
               -o gradlew

          # FIX #4: Create local.properties with Android SDK path
          echo "sdk.dir=${ANDROID_HOME}" > local.properties

          cat << 'EOF' > gradle.properties
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              # FIX #11: Use FAIL_ON_PROJECT_REPOS for deterministic builds
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "WiFiAudio"
          include ':app'
          EOF

          cat << 'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.1.1' apply false
              # FIX #10: Use Kotlin 1.9.0 (compatible with AGP 8.1.1)
              id 'org.jetbrains.kotlin.android' version '1.9.0' apply false
          }
          EOF

          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }

          android {
              namespace = 'com.example.wifiaudio'
              # FIX #6: Use explicit assignment syntax for AGP 8.x
              compileSdk = 34

              defaultConfig {
                  applicationId = "com.example.wifiaudio"
                  minSdk = 29
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0"
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = '17'
              }
              # FIX #5: lintOptions → lint (renamed in AGP 7.0+)
              lint {
                  abortOnError false
              }
          }

          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          # ... (AndroidManifest, strings, layout — unchanged) ...

          cat << 'EOF' > app/src/main/java/com/example/wifiaudio/MainActivity.kt
          package com.example.wifiaudio
          import android.Manifest
          import android.app.Notification
          import android.app.NotificationChannel
          import android.app.NotificationManager
          import android.app.Service
          import android.content.Context
          import android.content.Intent
          import android.content.pm.PackageManager
          import android.media.AudioAttributes
          import android.media.AudioFormat
          import android.media.AudioManager
          import android.media.AudioPlaybackCaptureConfig
          import android.media.AudioRecord
          import android.media.projection.MediaProjection
          import android.media.projection.MediaProjectionManager
          import android.os.Build
          import android.os.Bundle
          import android.os.IBinder
          import android.widget.Button
          import android.widget.EditText
          import android.widget.Toast
          import androidx.activity.result.contract.ActivityResultContracts
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.app.ActivityCompat
          import androidx.core.app.NotificationCompat
          import androidx.core.content.ContextCompat
          import java.net.DatagramPacket
          import java.net.DatagramSocket
          import java.net.InetAddress
          import kotlin.concurrent.thread

          class MainActivity : AppCompatActivity() {
              private var ipAddress = ""
              private var portNumber = 50005
              private var isServiceRunning = false

              # FIX #9: Use modern ActivityResult API (no deprecated onActivityResult)
              private val mediaProjectionLauncher = registerForActivityResult(
                  ActivityResultContracts.StartActivityForResult()
              ) { result ->
                  if (result.resultCode == RESULT_OK && result.data != null) {
                      val serviceIntent = Intent(this, AudioCaptureService::class.java).apply {
                          putExtra("IP", ipAddress)
                          putExtra("PORT", portNumber)
                          putExtra("RESULT_CODE", result.resultCode)
                          # FIX #8: Pass Intent via extra, not package-level var
                          putExtra("DATA", result.data)
                      }
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          startForegroundService(serviceIntent)
                      } else {
                          startService(serviceIntent)
                      }
                      isServiceRunning = true
                      findViewById<Button>(R.id.btnStream).apply {
                          text = "STOP STREAMING"
                          setBackgroundColor(android.graphics.Color.parseColor("#FF3B30"))
                      }
                  } else {
                      Toast.makeText(this, "Permission denied!", Toast.LENGTH_SHORT).show()
                  }
              }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  val etIp = findViewById<EditText>(R.id.etIp)
                  val etPort = findViewById<EditText>(R.id.etPort)
                  val btnStream = findViewById<Button>(R.id.btnStream)

                  btnStream.setOnClickListener {
                      if (isServiceRunning) {
                          stopAudioService()
                          btnStream.text = "START STREAMING"
                          btnStream.setBackgroundColor(android.graphics.Color.parseColor("#008024"))
                      } else {
                          val permissions = mutableListOf(Manifest.permission.RECORD_AUDIO)
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                              permissions.add(Manifest.permission.POST_NOTIFICATIONS)
                          }
                          val needed = permissions.filter {
                              ContextCompat.checkSelfPermission(this, it) != PackageManager.PERMISSION_GRANTED
                          }
                          if (needed.isNotEmpty()) {
                              ActivityCompat.requestPermissions(this, needed.toTypedArray(), 100)
                              return@setOnClickListener
                          }
                          ipAddress = etIp.text.toString().trim()
                          portNumber = etPort.text.toString().trim().toIntOrNull() ?: 50005
                          if (ipAddress.isEmpty()) {
                              Toast.makeText(this, "Enter PC IP Address!", Toast.LENGTH_SHORT).show()
                              return@setOnClickListener
                          }
                          val mpManager = getSystemService(Context.MEDIA_PROJECTION_SERVICE) as MediaProjectionManager
                          mediaProjectionLauncher.launch(mpManager.createScreenCaptureIntent())
                      }
                  }
              }

              private fun stopAudioService() {
                  stopService(Intent(this, AudioCaptureService::class.java))
                  isServiceRunning = false
              }
          }

          class AudioCaptureService : Service() {
              private var isStreaming = false
              private var socket: DatagramSocket? = null
              private var mediaProjection: MediaProjection? = null
              private var audioRecord: AudioRecord? = null
              private var audioManager: AudioManager? = null
              private var originalVolume = 0

              override fun onBind(intent: Intent?): IBinder? = null

              override fun onCreate() {
                  super.onCreate()
                  audioManager = getSystemService(Context.AUDIO_SERVICE) as AudioManager
              }

              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  val ip = intent?.getStringExtra("IP") ?: ""
                  val port = intent?.getIntExtra("PORT", 50005) ?: 50005
                  val resultCode = intent?.getIntExtra("RESULT_CODE", 0) ?: 0
                  # FIX #8: Read Intent from extra (not a global variable)
                  @Suppress("DEPRECATION")
                  val resultData: Intent = intent?.getParcelableExtra("DATA")
                      ?: run { stopSelf(); return START_NOT_STICKY }

                  if (ip.isEmpty() || resultCode == 0) {
                      stopSelf(); return START_NOT_STICKY
                  }

                  startNotification()

                  val mpManager = getSystemService(Context.MEDIA_PROJECTION_SERVICE) as MediaProjectionManager
                  mediaProjection = mpManager.getMediaProjection(resultCode, resultData)

                  if (mediaProjection != null) {
                      isStreaming = true
                      audioManager?.let {
                          originalVolume = it.getStreamVolume(AudioManager.STREAM_MUSIC)
                          it.setStreamVolume(AudioManager.STREAM_MUSIC, 0, 0)
                      }
                      startAudioStream(ip, port)
                  } else { stopSelf() }

                  return START_STICKY
              }

              private fun startNotification() {
                  val channelId = "WiFiAudioChannel"
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val channel = NotificationChannel(
                          channelId, "Wi-Fi Audio Streaming", NotificationManager.IMPORTANCE_LOW)
                      getSystemService(NotificationManager::class.java)?.createNotificationChannel(channel)
                  }
                  val notification: Notification = NotificationCompat.Builder(this, channelId)
                      .setContentTitle("Wi-Fi Audio Streaming")
                      .setContentText("Streaming internal audio to PC...")
                      .setSmallIcon(android.R.drawable.ic_media_play)
                      .build()
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      startForeground(1, notification,
                          android.content.pm.ServiceInfo.FOREGROUND_SERVICE_TYPE_MEDIA_PROJECTION)
                  } else {
                      startForeground(1, notification)
                  }
              }

              private fun startAudioStream(ip: String, port: Int) {
                  thread {
                      try {
                          socket = DatagramSocket()
                          val address = InetAddress.getByName(ip)
                          val sampleRate = 22050
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q && mediaProjection != null) {
                              val config = AudioPlaybackCaptureConfig.Builder(mediaProjection!!)
                                  .addMatchingUsage(AudioAttributes.USAGE_MEDIA)
                                  .addMatchingUsage(AudioAttributes.USAGE_GAME)
                                  .addMatchingUsage(AudioAttributes.USAGE_UNKNOWN)
                                  .build()
                              val bufferSize = AudioRecord.getMinBufferSize(
                                  sampleRate, AudioFormat.CHANNEL_IN_MONO,
                                  AudioFormat.ENCODING_PCM_16BIT) * 2
                              if (ContextCompat.checkSelfPermission(this,
                                      Manifest.permission.RECORD_AUDIO) == PackageManager.PERMISSION_GRANTED) {
                                  audioRecord = AudioRecord.Builder()
                                      .setAudioFormat(AudioFormat.Builder()
                                          .setEncoding(AudioFormat.ENCODING_PCM_16BIT)
                                          .setSampleRate(sampleRate)
                                          .setChannelMask(AudioFormat.CHANNEL_IN_MONO)
                                          .build())
                                      .setAudioPlaybackCaptureConfig(config)
                                      .setBufferSizeInBytes(bufferSize)
                                      .build()
                                  val buffer = ByteArray(1024)
                                  audioRecord?.startRecording()
                                  while (isStreaming) {
                                      val read = audioRecord?.read(buffer, 0, buffer.size) ?: 0
                                      if (read > 0) socket?.send(DatagramPacket(buffer, read, address, port))
                                  }
                              }
                          }
                      } catch (e: Exception) { e.printStackTrace() }
                      finally { stopStreaming() }
                  }
              }

              private fun stopStreaming() {
                  isStreaming = false
                  audioManager?.setStreamVolume(AudioManager.STREAM_MUSIC, originalVolume, 0)
                  try { audioRecord?.stop(); audioRecord?.release() } catch (e: Exception) {}
                  try { mediaProjection?.stop() } catch (e: Exception) {}
                  socket?.close()
                  # FIX #7: stopForeground(boolean) deprecated in API 33
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                      stopForeground(STOP_FOREGROUND_REMOVE)
                  } else {
                      @Suppress("DEPRECATION")
                      stopForeground(true)
                  }
                  stopSelf()
              }

              override fun onDestroy() { stopStreaming(); super.onDestroy() }
          }
          EOF

      # REMOVED: "Generate Local Wrapper" step — it was broken & unnecessary
      # (wrapper files are now created inline in the step above)

      # FIX #1: Make gradlew executable before running it
      - name: Make gradlew Executable
        run: chmod +x ./gradlew

      # FIX #12: Add --no-daemon and --stacktrace for CI
      - name: Compile App Package (Build APK)
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: WiFiAudio-Android-App
          path: app/build/outputs/apk/debug/app-debug.apk
