name: Generate Android Live Audio APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.1.1

      - name: Auto-Generate Pure Java Android Project Structure
        run: |
          mkdir -p app/src/main/java/com/example/wifiaudio
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # 1. AndroidX Support Enabler (gradle.properties)
          cat << 'EOF' > gradle.properties
          android.useAndroidX=true
          EOF

          # 2. Root settings.gradle
          cat << 'EOF' > settings.gradle
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "WiFiAudio"
          include ':app'
          EOF

          # 3. Root build.gradle (NO KOTLIN PLUGINS)
          cat << 'EOF' > build.gradle
          plugins {
              id 'com.android.application' version '8.1.1' apply false
          }
          EOF

          # 4. App build.gradle (Pure Java Build Setup)
          cat << 'EOF' > app/build.gradle
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'com.example.wifiaudio'
              compileSdk 34

              defaultConfig {
                  applicationId "com.example.wifiaudio"
                  minSdk 29
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              lintOptions {
                  abortOnError false
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF

          # 5. Android Manifest
          cat << 'EOF' > app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.example.wifiaudio">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PROJECTION" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              
              <application
                  android:allowBackup="true"
                  android:label="Wi-Fi Audio Streamer"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  
                  <activity android:name="com.example.wifiaudio.MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <service 
                      android:name="com.example.wifiaudio.AudioCaptureService"
                      android:foregroundServiceType="mediaProjection"
                      android:exported="false" />
              </application>
          </manifest>
          EOF

          # 6. Strings XML
          cat << 'EOF' > app/src/main/res/values/strings.xml
          <resources><string name="app_name">Wi-Fi Audio</string></resources>
          EOF

          # 7. Activity Main Layout
          cat << 'EOF' > app/src/main/res/layout/activity_main.xml
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="#0A0A0A" android:padding="24dp" android:gravity="center">
              <TextView android:layout_width="wrap_content" android:layout_height="wrap_content"
                  android:text="WI-FI INTERNAL AUDIO" android:textColor="#00FF41" android:textSize="22sp" android:textStyle="bold" android:layout_marginBottom="30dp"/>
              <EditText android:id="@+id/etIp" android:layout_width="match_parent" android:layout_height="50dp"
                  android:hint="PC IP Address (e.g. 192.168.43.1)" android:textColorHint="#555555" android:textColor="#FFFFFF" android:backgroundTint="#00FF41" android:inputType="text" android:layout_marginBottom="15dp"/>
              <EditText android:id="@+id/etPort" android:layout_width="match_parent" android:layout_height="50dp"
                  android:text="50005" android:textColor="#FFFFFF" android:backgroundTint="#00FF41" android:inputType="number" android:layout_marginBottom="30dp"/>
              <Button android:id="@+id/btnStream" android:layout_width="match_parent" android:layout_height="55dp"
                  android:text="START STREAMING" android:backgroundTint="#008024" android:textColor="#FFFFFF" android:textStyle="bold"/>
          </LinearLayout>
          EOF

          # 8. MainActivity.java (100% Type-Safe Pure Java)
          cat << 'EOF' > app/src/main/java/com/example/wifiaudio/MainActivity.java
          package com.example.wifiaudio;

          import android.Manifest;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.graphics.Color;
          import android.media.projection.MediaProjectionManager;
          import android.os.Build;
          import android.os.Bundle;
          import android.widget.Button;
          import android.widget.EditText;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.app.ActivityCompat;
          import androidx.core.content.ContextCompat;
          import java.util.ArrayList;
          import java.util.List;

          public class MainActivity extends AppCompatActivity {
              private static final int REQUEST_MEDIA_PROJECTION = 1001;
              private String ipAddress = "";
              private int portNumber = 50005;
              private boolean isServiceRunning = false;

              // Static field for bulletproof data transmission to service
              public static Intent mediaProjectionData = null;

              private EditText etIp;
              private EditText etPort;
              private Button btnStream;

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  etIp = findViewById(R.id.etIp);
                  etPort = findViewById(R.id.etPort);
                  btnStream = findViewById(R.id.btnStream);

                  btnStream.setOnClickListener(v -> {
                      if (isServiceRunning) {
                          stopAudioService();
                          btnStream.setText("START STREAMING");
                          btnStream.setBackgroundColor(Color.parseColor("#008024"));
                      } else {
                          List<String> permissions = new ArrayList<>();
                          permissions.add(Manifest.permission.RECORD_AUDIO);
                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
                              permissions.add(Manifest.permission.POST_NOTIFICATIONS);
                          }

                          List<String> neededPermissions = new ArrayList<>();
                          for (String perm : permissions) {
                              if (ContextCompat.checkSelfPermission(MainActivity.this, perm) != PackageManager.PERMISSION_GRANTED) {
                                  neededPermissions.add(perm);
                              }
                          }

                          if (!neededPermissions.isEmpty()) {
                              ActivityCompat.requestPermissions(MainActivity.this, neededPermissions.toArray(new String[0]), 100);
                              return;
                          }

                          ipAddress = etIp.getText().toString().trim();
                          String portStr = etPort.getText().toString().trim();
                          try {
                              portNumber = portStr.isEmpty() ? 50005 : Integer.parseInt(portStr);
                          } catch (NumberFormatException e) {
                              portNumber = 50005;
                          }

                          if (ipAddress.isEmpty()) {
                              Toast.makeText(MainActivity.this, "Enter PC IP Address!", Toast.LENGTH_SHORT).show();
                              return;
                          }

                          MediaProjectionManager mpManager = (MediaProjectionManager) getSystemService(Context.MEDIA_PROJECTION_SERVICE);
                          if (mpManager != null) {
                              startActivityForResult(mpManager.createScreenCaptureIntent(), REQUEST_MEDIA_PROJECTION);
                          }
                      }
                  });
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (requestCode == REQUEST_MEDIA_PROJECTION) {
                      if (resultCode == RESULT_OK && data != null) {
                          mediaProjectionData = data;
                          Intent serviceIntent = new Intent(MainActivity.this, AudioCaptureService.class);
                          serviceIntent.putExtra("IP", ipAddress);
                          serviceIntent.putExtra("PORT", portNumber);
                          serviceIntent.putExtra("RESULT_CODE", resultCode);

                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                              startForegroundService(serviceIntent);
                          } else {
                              startService(serviceIntent);
                          }

                          isServiceRunning = true;
                          btnStream.setText("STOP STREAMING");
                          btnStream.setBackgroundColor(Color.parseColor("#FF3B30"));
                      } else {
                          Toast.makeText(MainActivity.this, "Permission denied!", Toast.LENGTH_SHORT).show();
                      }
                  }
              }

              private void stopAudioService() {
                  Intent serviceIntent = new Intent(MainActivity.this, AudioCaptureService.class);
                  stopService(serviceIntent);
                  mediaProjectionData = null;
                  isServiceRunning = false;
              }
          }
          EOF

          # 9. AudioCaptureService.java (Pure Java Audio Streamer)
          cat << 'EOF' > app/src/main/java/com/example/wifiaudio/AudioCaptureService.java
          package com.example.wifiaudio;

          import android.Manifest;
          import android.app.Notification;
          import android.app.NotificationChannel;
          import android.app.NotificationManager;
          import android.app.Service;
          import android.content.Context;
          import android.content.Intent;
          import android.content.pm.PackageManager;
          import android.media.AudioAttributes;
          import android.media.AudioFormat;
          import android.media.AudioManager;
          import android.media.AudioPlaybackCaptureConfig;
          import android.media.AudioRecord;
          import android.media.projection.MediaProjection;
          import android.media.projection.MediaProjectionManager;
          import android.os.Build;
          import android.os.IBinder;
          import androidx.core.app.NotificationCompat;
          import androidx.core.content.ContextCompat;
          import java.io.IOException;
          import java.net.DatagramPacket;
          import java.net.DatagramSocket;
          import java.net.InetAddress;

          public class AudioCaptureService extends Service {
              private boolean isStreaming = false;
              private DatagramSocket socket = null;
              private MediaProjection mediaProjection = null;
              private AudioRecord audioRecord = null;
              private AudioManager audioManager = null;
              private int originalVolume = 0;

              @Override
              public IBinder onBind(Intent intent) {
                  return null;
              }

              @Override
              public void onCreate() {
                  super.onCreate();
                  audioManager = (AudioManager) getSystemService(Context.AUDIO_SERVICE);
              }

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  if (intent == null) {
                      stopSelf();
                      return START_NOT_STICKY;
                  }

                  String ip = intent.getStringExtra("IP");
                  int port = intent.getIntExtra("PORT", 50005);
                  int resultCode = intent.getIntExtra("RESULT_CODE", 0);
                  Intent resultData = MainActivity.mediaProjectionData;

                  if (ip == null || ip.isEmpty() || resultCode == 0 || resultData == null) {
                      stopSelf();
                      return START_NOT_STICKY;
                  }

                  startNotification();

                  MediaProjectionManager mpManager = (MediaProjectionManager) getSystemService(Context.MEDIA_PROJECTION_SERVICE);
                  if (mpManager != null) {
                      mediaProjection = mpManager.getMediaProjection(resultCode, resultData);
                  }

                  if (mediaProjection != null) {
                      isStreaming = true;
                      if (audioManager != null) {
                          originalVolume = audioManager.getStreamVolume(AudioManager.STREAM_MUSIC);
                          audioManager.setStreamVolume(AudioManager.STREAM_MUSIC, 0, 0);
                      }
                      startAudioStream(ip, port);
                  } else {
                      stopSelf();
                  }

                  return START_STICKY;
              }

              private void startNotification() {
                  String channelId = "WiFiAudioChannel";
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      NotificationChannel channel = new NotificationChannel(channelId, "Wi-Fi Audio Streaming", NotificationManager.IMPORTANCE_LOW);
                      NotificationManager manager = getSystemService(NotificationManager.class);
                      if (manager != null) {
                          manager.createNotificationChannel(channel);
                      }
                  }

                  Notification notification = new NotificationCompat.Builder(this, channelId)
                          .setContentTitle("Wi-Fi Audio Streaming")
                          .setContentText("Streaming internal audio silently to PC...")
                          .setSmallIcon(android.R.drawable.ic_media_play)
                          .build();

                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      startForeground(1, notification, android.content.pm.ServiceInfo.FOREGROUND_SERVICE_TYPE_MEDIA_PROJECTION);
                  } else {
                      startForeground(1, notification);
                  }
              }

              private void startAudioStream(String ip, int port) {
                  new Thread(() -> {
                      try {
                          socket = new DatagramSocket();
                          InetAddress address = InetAddress.getByName(ip);
                          int sampleRate = 22050;

                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q && mediaProjection != null) {
                              AudioPlaybackCaptureConfig config = new AudioPlaybackCaptureConfig.Builder(mediaProjection)
                                      .addMatchingUsage(AudioAttributes.USAGE_MEDIA)
                                      .addMatchingUsage(AudioAttributes.USAGE_GAME)
                                      .addMatchingUsage(AudioAttributes.USAGE_UNKNOWN)
                                      .build();

                              int bufferSize = AudioRecord.getMinBufferSize(sampleRate, AudioFormat.CHANNEL_IN_MONO, AudioFormat.ENCODING_PCM_16BIT) * 2;

                              if (ContextCompat.checkSelfPermission(AudioCaptureService.this, Manifest.permission.RECORD_AUDIO) == PackageManager.PERMISSION_GRANTED) {
                                  audioRecord = new AudioRecord.Builder()
                                          .setAudioFormat(new AudioFormat.Builder()
                                                  .setEncoding(AudioFormat.ENCODING_PCM_16BIT)
                                                  .setSampleRate(sampleRate)
                                                  .setChannelMask(AudioFormat.CHANNEL_IN_MONO)
                                                  .build())
                                          .setAudioPlaybackCaptureConfig(config)
                                          .setBufferSizeInBytes(bufferSize)
                                          .build();

                                  byte[] buffer = new byte[1024];
                                  audioRecord.startRecording();

                                  while (isStreaming) {
                                      int read = audioRecord.read(buffer, 0, buffer.length);
                                      if (read > 0) {
                                          DatagramPacket packet = new DatagramPacket(buffer, read, address, port);
                                          socket.send(packet);
                                      }
                                  }
                              }
                          }
                      } catch (IOException e) {
                          e.printStackTrace();
                      } finally {
                          stopStreaming();
                      }
                  }).start();
              }

              private void stopStreaming() {
                  isStreaming = false;

                  if (audioManager != null) {
                      audioManager.setStreamVolume(AudioManager.STREAM_MUSIC, originalVolume, 0);
                  }

                  try {
                      if (audioRecord != null) {
                          audioRecord.stop();
                          audioRecord.release();
                      }
                  } catch (Exception ignored) {}

                  try {
                      if (mediaProjection != null) {
                          mediaProjection.stop();
                      }
                  } catch (Exception ignored) {}

                  if (socket != null) {
                      socket.close();
                  }

                  stopForeground(true);
                  stopSelf();
              }

              @Override
              public void onDestroy() {
                  stopStreaming();
                  super.onDestroy();
              }
          }
          EOF

      - name: Generate Local Wrapper
        run: gradle wrapper --gradle-version 8.1.1

      - name: Compile App Package (Build APK)
        run: ./gradlew assembleDebug

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: WiFiAudio-Android-App
          path: app/build/outputs/apk/debug/app-debug.apk
